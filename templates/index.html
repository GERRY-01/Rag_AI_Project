<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RAG PDF Chatbot</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2c2c54);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 700px;
            background: #111827;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #60a5fa;
        }

        form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 16px;
        }

        button {
            padding: 12px 18px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            background: #2563eb;
        }

       .answer-box {
            background: #1f2937;
            padding: 15px;
            border-radius: 10px;
            min-height: 100px;
            white-space: pre-wrap;
            line-height: 1.5;
        }

        .label {
            margin-bottom: 8px;
            font-weight: bold;
            color: #93c5fd;
        }

        .empty {
            color: #9ca3af;
            font-style: italic;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>RAG PDF Chatbot</h1>

    <form method="POST">
        <input
            type="text"
            name="query"
            placeholder="Ask something about your PDF..."
            required
        >
        <button type="submit">Ask</button>
    </form>

    <div class="label">Answer:</div>

    <div class="answer-box">
        {% if answer %}
            {{ answer }}
        {% else %}
            <span class="empty">Your AI response will appear here...</span>
        {% endif %}
    </div>

</div>

</body>
</html>
